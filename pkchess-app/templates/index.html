<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PKChess</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: #16213e;
            border-radius: 20px;
            padding: 40px;
            width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        h1 {
            text-align: center;
            font-size: 2.5em;
            color: #f0c040;
            margin-bottom: 8px;
            text-shadow: 0 2px 10px rgba(240,192,64,0.4);
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 32px;
            font-size: 0.9em;
        }
        .section {
            background: #0f3460;
            border-radius: 14px;
            padding: 24px;
            margin-bottom: 16px;
        }
        h2 {
            font-size: 1em;
            color: #f0c040;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            background: #1a1a2e;
            border: 2px solid #333;
            border-radius: 10px;
            color: white;
            font-size: 1em;
            margin-bottom: 12px;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: #f0c040; }
        input::placeholder { color: #555; }
        button {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        .btn-creer { background: #f0c040; color: #1a1a2e; }
        .btn-rejoindre { background: #4a90d9; color: white; }
        .erreur {
            color: #ff6b6b;
            font-size: 0.85em;
            margin-top: 8px;
            display: none;
        }
        .code-affiche {
            text-align: center;
            font-size: 2.5em;
            font-weight: bold;
            letter-spacing: 8px;
            color: #f0c040;
            background: #1a1a2e;
            padding: 16px;
            border-radius: 10px;
            margin: 12px 0;
            display: none;
        }
        .info { color: #aaa; font-size: 0.85em; text-align: center; display: none; }
    </style>
</head>
<body>
<div class="container">
    <h1>PKChess</h1>
    <p class="subtitle">The Pokémon Auto Battler</p>

    <div class="section">
        <h2>🎮 Créer une partie</h2>
        <input type="text" id="pseudo-creer" placeholder="Ton pseudo" maxlength="20">
        <button class="btn-creer" onclick="creerPartie()">Créer</button>
        <div class="code-affiche" id="code-affiche"></div>
        <p class="info" id="info-creer">Partage ce code à tes amis !</p>
        <p class="erreur" id="err-creer"></p>
    </div>

    <div class="section">
        <h2>🔗 Rejoindre une partie</h2>
        <input type="text" id="pseudo-rejoindre" placeholder="Ton pseudo" maxlength="20">
        <input type="text" id="code-rejoindre" placeholder="Code de partie (ex: PKCH)" maxlength="4"
               style="text-transform:uppercase; letter-spacing: 4px;">
        <button class="btn-rejoindre" onclick="rejoindrePartie()">Rejoindre</button>
        <p class="erreur" id="err-rejoindre"></p>
    </div>
</div>

<script>
async function creerPartie() {
    const pseudo = document.getElementById('pseudo-creer').value.trim();
    if (!pseudo) return afficherErreur('err-creer', 'Entre ton pseudo !');

    const res  = await fetch('/creer', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({pseudo})
    });
    const data = await res.json();

    const codeEl = document.getElementById('code-affiche');
    const infoEl = document.getElementById('info-creer');
    codeEl.textContent = data.code;
    codeEl.style.display = 'block';
    infoEl.style.display = 'block';

    // Rediriger après 2 secondes
    setTimeout(() => {
        window.location.href = `/jeu/${data.code}?pseudo=${encodeURIComponent(pseudo)}`;
    }, 2000);
}

async function rejoindrePartie() {
    const pseudo = document.getElementById('pseudo-rejoindre').value.trim();
    const code   = document.getElementById('code-rejoindre').value.trim().toUpperCase();
    if (!pseudo) return afficherErreur('err-rejoindre', 'Entre ton pseudo !');
    if (!code)   return afficherErreur('err-rejoindre', 'Entre le code de partie !');

    const res  = await fetch('/rejoindre', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({pseudo, code})
    });
    const data = await res.json();

    if (data.erreur) return afficherErreur('err-rejoindre', data.erreur);
    window.location.href = `/jeu/${code}?pseudo=${encodeURIComponent(pseudo)}`;
}

function afficherErreur(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 3000);
}
</script>
</body>
</html>
