<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PKChess — The Pokémon Auto Battler</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #FFD700;
            --gold-dark: #C8A800;
            --blue-deep: #0D1B3E;
            --blue-mid: #1A2F5E;
            --blue-light: #243D7A;
            --red: #E63946;
            --green: #52B788;
            --white: #F8F9FA;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--blue-deep);
            color: var(--white);
            font-family: 'Nunito', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated background */
        .bg-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }

        .pokeball-bg {
            position: absolute;
            border-radius: 50%;
            border: 3px solid rgba(255,215,0,0.06);
            animation: rotate-slow linear infinite;
        }
        .pokeball-bg::after {
            content: '';
            position: absolute;
            top: 50%;
            left: -10%;
            right: -10%;
            height: 3px;
            background: rgba(255,215,0,0.06);
            transform: translateY(-50%);
        }
        .pokeball-bg:nth-child(1) { width: 600px; height: 600px; top: -200px; right: -150px; animation-duration: 40s; }
        .pokeball-bg:nth-child(2) { width: 400px; height: 400px; bottom: -100px; left: -100px; animation-duration: 60s; animation-direction: reverse; }
        .pokeball-bg:nth-child(3) { width: 250px; height: 250px; top: 40%; left: 60%; animation-duration: 30s; }

        @keyframes rotate-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Stars */
        .star {
            position: absolute;
            width: 3px; height: 3px;
            background: rgba(255,215,0,0.4);
            border-radius: 50%;
            animation: twinkle ease-in-out infinite;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }

        /* Main container */
        .main {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 480px;
            padding: 20px;
            animation: fadeInUp 0.7s ease both;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Logo */
        .logo-wrap {
            text-align: center;
            margin-bottom: 36px;
        }

        .logo-img-texte {
            height: 60px;
            object-fit: contain;
            display: block;
            margin: 0 auto 12px;
            filter: drop-shadow(0 0 16px rgba(255,215,0,0.5));
        }

        .logo-img-pokeball {
            height: 80px;
            width: 80px;
            object-fit: contain;
            display: block;
            margin: 0 auto 12px;
            animation: spin-pokeball 6s linear infinite;
            filter: drop-shadow(0 0 20px rgba(255,215,0,0.4));
        }

        @keyframes spin-pokeball { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .logo-sub {
            font-size: 0.85em;
            color: rgba(255,255,255,0.5);
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 700;
        }

        /* Cards */
        .card {
            background: linear-gradient(135deg, var(--blue-mid), var(--blue-light));
            border-radius: 20px;
            padding: 28px;
            margin-bottom: 16px;
            border: 1px solid rgba(255,215,0,0.15);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .card:hover {
            border-color: rgba(255,215,0,0.3);
            box-shadow: 0 12px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
        }

        .card-title {
            font-family: 'Press Start 2P', monospace;
            font-size: 0.65em;
            color: var(--gold);
            margin-bottom: 20px;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .card-title .icon {
            width: 28px; height: 28px;
            border-radius: 50%;
            background: rgba(255,215,0,0.15);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4em;
        }

        input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(0,0,0,0.3);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: var(--white);
            font-size: 1em;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            margin-bottom: 12px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(255,215,0,0.15);
        }
        input::placeholder { color: rgba(255,255,255,0.3); font-weight: 600; }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 1em;
            font-weight: 900;
            font-family: 'Nunito', sans-serif;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }
        .btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,0);
            transition: background 0.2s;
        }
        .btn:hover::after { background: rgba(255,255,255,0.1); }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
        .btn:active { transform: translateY(0); }

        .btn-gold {
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: var(--blue-deep);
            box-shadow: 0 4px 16px rgba(255,215,0,0.3);
        }
        .btn-blue {
            background: linear-gradient(135deg, #3A7BFF, #1A55D0);
            color: white;
            box-shadow: 0 4px 16px rgba(58,123,255,0.3);
        }

        /* Code display */
        .code-display {
            text-align: center;
            display: none;
            animation: fadeInUp 0.4s ease both;
        }
        .code-display .label {
            font-size: 0.8em;
            color: rgba(255,255,255,0.5);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .code-value {
            font-family: 'Press Start 2P', monospace;
            font-size: 2em;
            color: var(--gold);
            letter-spacing: 10px;
            background: rgba(0,0,0,0.3);
            padding: 16px 20px;
            border-radius: 12px;
            border: 2px solid rgba(255,215,0,0.3);
            text-shadow: 0 0 15px rgba(255,215,0,0.5);
            margin-bottom: 12px;
        }
        .code-hint {
            font-size: 0.85em;
            color: rgba(255,255,255,0.5);
        }

        .erreur {
            color: #ff6b6b;
            font-size: 0.85em;
            margin-top: 8px;
            display: none;
            font-weight: 700;
        }

        /* Separator */
        .separator {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 4px 0 16px;
            color: rgba(255,255,255,0.2);
            font-size: 0.8em;
            font-weight: 700;
            letter-spacing: 2px;
        }
        .separator::before, .separator::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

<div class="bg-canvas">
    <div class="pokeball-bg"></div>
    <div class="pokeball-bg"></div>
    <div class="pokeball-bg"></div>
</div>

<div class="main">
    <div class="logo-wrap">
        <img src="/static/PKChess.png" alt="PKChess" class="logo-img-texte">
        <img src="/static/pokeball.png" alt="Pokeball" class="logo-img-pokeball">
        <div class="logo-sub">The Pokémon Auto Battler</div>
    </div>

    <!-- Créer -->
    <div class="card">
        <div class="card-title">
            <span class="icon">⚔️</span>
            Créer une partie
        </div>
        <input type="text" id="pseudo-creer" placeholder="Ton pseudo de dresseur" maxlength="20">
        <button class="btn btn-gold" onclick="creerPartie()">Nouvelle aventure →</button>
        <div class="erreur" id="err-creer"></div>

        <div class="code-display" id="code-display">
            <div style="height:16px"></div>
            <div class="label">Code de la partie</div>
            <div class="code-value" id="code-val"></div>
            <div class="code-hint">Partage ce code avec tes amis !</div>
        </div>
    </div>

    <div class="separator">ou</div>

    <!-- Rejoindre -->
    <div class="card">
        <div class="card-title">
            <span class="icon">🔗</span>
            Rejoindre une partie
        </div>
        <input type="text" id="pseudo-rejoindre" placeholder="Ton pseudo de dresseur" maxlength="20">
        <input type="text" id="code-rejoindre" placeholder="Code de la partie (ex: PKCH)" maxlength="4"
               style="text-transform:uppercase; letter-spacing: 6px; font-family:'Press Start 2P',monospace; font-size:0.9em;">
        <button class="btn btn-blue" onclick="rejoindrePartie()">Rejoindre →</button>
        <div class="erreur" id="err-rejoindre"></div>
    </div>
</div>

<script>
    // Generate stars
    const canvas = document.querySelector('.bg-canvas');
    for (let i = 0; i < 60; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.animationDuration = (2 + Math.random() * 4) + 's';
        star.style.animationDelay = (Math.random() * 4) + 's';
        star.style.width = star.style.height = (1 + Math.random() * 3) + 'px';
        canvas.appendChild(star);
    }

    async function creerPartie() {
        const pseudo = document.getElementById('pseudo-creer').value.trim();
        const err = document.getElementById('err-creer');
        if (!pseudo) { err.style.display = 'block'; err.textContent = '⚠️ Entre ton pseudo !'; return; }
        err.style.display = 'none';

        try {
            const res = await fetch('/creer', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({pseudo})
            });
            const data = await res.json();
            document.getElementById('code-val').textContent = data.code;
            document.getElementById('code-display').style.display = 'block';
            setTimeout(() => window.location.href = `/jeu/${data.code}?pseudo=${encodeURIComponent(pseudo)}`, 2000);
        } catch(e) {
            err.style.display = 'block'; err.textContent = '❌ Erreur de connexion';
        }
    }

    async function rejoindrePartie() {
        const pseudo = document.getElementById('pseudo-rejoindre').value.trim();
        const code = document.getElementById('code-rejoindre').value.trim().toUpperCase();
        const err = document.getElementById('err-rejoindre');
        if (!pseudo || !code) { err.style.display = 'block'; err.textContent = '⚠️ Remplis tous les champs !'; return; }
        err.style.display = 'none';

        try {
            const res = await fetch('/rejoindre', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({pseudo, code})
            });
            const data = await res.json();
            if (data.erreur) { err.style.display = 'block'; err.textContent = '❌ ' + data.erreur; return; }
            window.location.href = `/jeu/${code}?pseudo=${encodeURIComponent(pseudo)}`;
        } catch(e) {
            err.style.display = 'block'; err.textContent = '❌ Erreur de connexion';
        }
    }

    // Enter key support
    document.addEventListener('keydown', e => {
        if (e.key === 'Enter') {
            if (document.activeElement.id.includes('creer')) creerPartie();
            else rejoindrePartie();
        }
    });

    document.getElementById('code-rejoindre').addEventListener('input', function() {
        this.value = this.value.toUpperCase();
    });
</script>
</body>
</html>
