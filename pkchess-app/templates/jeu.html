<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PKChess</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold:#FFD700;--gold-dark:#C8A800;--blue-deep:#0D1B3E;--blue-mid:#1A2F5E;
            --blue-light:#243D7A;--blue-card:#162447;--red:#E63946;--green:#52B788;--white:#F8F9FA;
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:var(--blue-deep);color:var(--white);font-family:'Nunito',sans-serif;min-height:100vh;display:flex;flex-direction:column;}

        /* Header */
        .header{background:linear-gradient(90deg,var(--blue-mid),var(--blue-light));padding:10px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid var(--gold);position:sticky;top:0;z-index:100;}
        .header-logo{font-family:'Press Start 2P',monospace;font-size:0.9em;color:var(--gold);}
        .header-code{font-family:'Press Start 2P',monospace;font-size:0.75em;background:rgba(0,0,0,0.3);padding:8px 16px;border-radius:20px;color:var(--gold);border:1px solid rgba(255,215,0,0.3);letter-spacing:4px;}
        .header-status{display:flex;align-items:center;gap:8px;font-size:0.85em;font-weight:700;}
        .dot{width:10px;height:10px;border-radius:50%;background:var(--red);}
        .dot.on{background:var(--green);box-shadow:0 0 8px var(--green);}

        /* Layout */
        .game-wrap{display:flex;gap:14px;padding:14px;flex:1;}
        .main-col{flex:1;display:flex;flex-direction:column;gap:12px;min-width:0;}

        /* Stats */
        .stats-bar{background:linear-gradient(135deg,var(--blue-mid),var(--blue-card));border-radius:14px;padding:12px 18px;display:flex;align-items:center;gap:12px;border:1px solid rgba(255,215,0,0.2);flex-wrap:wrap;}
        .player-name{font-family:'Press Start 2P',monospace;font-size:0.55em;color:var(--gold);}
        .stat-pill{display:flex;align-items:center;gap:5px;background:rgba(0,0,0,0.25);border-radius:20px;padding:5px 12px;font-weight:800;font-size:0.85em;}
        .stat-val{font-family:'Press Start 2P',monospace;font-size:0.8em;}
        .stat-pill.hp .stat-val{color:#FF6B6B;}
        .stat-pill.gp .stat-val{color:var(--gold);}
        .stat-pill.lv .stat-val{color:var(--green);}
        .stat-pill.xp .stat-val{color:#74C0FC;}
        .pv-bar-bg{flex:1;min-width:60px;background:rgba(0,0,0,0.3);border-radius:10px;height:8px;overflow:hidden;}
        .pv-bar{height:100%;border-radius:10px;background:linear-gradient(90deg,#FF6B6B,#E63946);transition:width 0.6s;}

        /* Plateau */
        .plateau-wrap{background:linear-gradient(135deg,var(--blue-mid),var(--blue-card));border-radius:18px;padding:16px;border:2px solid var(--gold);}
        .rangee-label{font-size:0.62em;font-weight:800;text-transform:uppercase;letter-spacing:2px;margin-bottom:8px;display:flex;align-items:center;gap:8px;color:rgba(255,255,255,0.6);}
        .dot-rouge{width:8px;height:8px;border-radius:50%;background:var(--red);display:inline-block;}
        .dot-bleu{width:8px;height:8px;border-radius:50%;background:#4A90D9;display:inline-block;}
        .dot-noir{width:8px;height:8px;border-radius:50%;background:#555;display:inline-block;}
        .rangee{display:flex;gap:10px;margin-bottom:12px;justify-content:center;}
        .sep{height:1px;background:rgba(255,255,255,0.07);margin:4px 0 12px;}

        /* Cases plateau */
        .case{width:100px;height:140px;border-radius:10px;border:2px dashed rgba(255,255,255,0.12);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all 0.2s;position:relative;overflow:hidden;flex-shrink:0;}
        .case.offensive{border-color:rgba(230,57,70,0.3);}
        .case.defensive{border-color:rgba(74,144,217,0.3);}
        .case.boite{border-color:rgba(255,255,255,0.1);}
        .case.bloquee{opacity:0.25;cursor:not-allowed;}
        .case.droppable{border-color:var(--gold) !important;border-style:solid !important;background:rgba(255,215,0,0.08) !important;}
        .case.occupee.offensive{border-style:solid;border-color:var(--red);}
        .case.occupee.defensive{border-style:solid;border-color:#4A90D9;}
        .case.occupee.boite{border-style:solid;border-color:#444;}
        .case img{width:100%;height:100%;object-fit:cover;border-radius:8px;cursor:pointer;}
        .case .plus{font-size:1.4em;color:rgba(255,255,255,0.15);}
        .case .lock-icon{font-size:0.6em;color:rgba(255,255,255,0.15);}
        .poke-nom{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.7);font-size:0.6em;font-weight:800;text-align:center;padding:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

        /* Boutons */
        .actions-bar{display:flex;gap:10px;flex-wrap:wrap;}
        .btn{padding:10px 18px;border:none;border-radius:12px;font-weight:900;font-family:'Nunito',sans-serif;cursor:pointer;font-size:0.88em;transition:transform 0.15s,opacity 0.2s;}
        .btn:hover{transform:translateY(-2px);}
        .btn:active{transform:translateY(0);}
        .btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:var(--blue-deep);}
        .btn-green{background:linear-gradient(135deg,#52B788,#2D8A60);color:white;}
        .btn-blue{background:linear-gradient(135deg,#3A7BFF,#1A55D0);color:white;}
        .btn-red{background:linear-gradient(135deg,#E63946,#C1121F);color:white;}
        .btn-gray{background:rgba(255,255,255,0.1);border:2px solid rgba(255,255,255,0.2);color:white;}
        .btn-lock{background:rgba(255,255,255,0.1);border:2px solid rgba(255,255,255,0.2);color:white;}
        .btn-lock.locked{background:rgba(255,215,0,0.15);border-color:var(--gold);color:var(--gold);}

        /* Sidebar */
        .sidebar{width:270px;flex-shrink:0;display:flex;flex-direction:column;gap:12px;}
        .panel{background:linear-gradient(135deg,var(--blue-mid),var(--blue-card));border-radius:16px;padding:16px;border:1px solid rgba(255,255,255,0.07);}
        .panel-title{font-size:0.62em;font-weight:800;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:2px;margin-bottom:12px;}
        .syn-wrap{display:flex;gap:6px;flex-wrap:wrap;}
        .syn-badge{background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.12);border-radius:20px;padding:4px 12px;font-size:0.78em;font-weight:800;}
        .syn-badge.actif{background:rgba(255,215,0,0.15);border-color:var(--gold);color:var(--gold);}
        .adversaire{background:rgba(0,0,0,0.2);border-radius:10px;padding:10px 12px;margin-bottom:8px;border:1px solid rgba(255,255,255,0.05);display:flex;align-items:center;gap:10px;}
        .adv-avatar{width:32px;height:32px;border-radius:50%;background:var(--blue-light);display:flex;align-items:center;justify-content:center;font-size:0.85em;font-weight:800;flex-shrink:0;}
        .adv-info{flex:1;min-width:0;}
        .adv-nom{font-weight:800;font-size:0.85em;}
        .adv-stats{display:flex;gap:8px;margin-top:3px;font-size:0.75em;font-weight:700;}
        .adv-hp{color:#FF6B6B;}.adv-gp{color:var(--gold);}.adv-lv{color:var(--green);}
        .log-list{max-height:160px;overflow-y:auto;scrollbar-width:thin;}
        .log-item{font-size:0.78em;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.04);color:rgba(255,255,255,0.6);display:flex;gap:6px;font-weight:600;}
        .log-item.gold{color:var(--gold);}
        .log-item.green{color:var(--green);}
        .log-item.red{color:#FF6B6B;}
        .log-time{color:rgba(255,255,255,0.3);flex-shrink:0;}
        .attente{text-align:center;color:rgba(255,255,255,0.3);padding:16px;font-style:italic;font-size:0.85em;}

        /* Modal boutique */
        .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;align-items:center;justify-content:center;}
        .modal-bg.open{display:flex;}
        .modal{background:linear-gradient(135deg,var(--blue-mid),var(--blue-card));border-radius:20px;padding:28px;border:2px solid var(--gold);width:98vw;max-width:98vw;height:92vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,0.7);}
        .modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
        .modal-title{font-family:'Press Start 2P',monospace;font-size:0.65em;color:var(--gold);}
        .modal-info{font-size:0.85em;color:rgba(255,255,255,0.6);font-weight:700;}
        .boutique-cartes{display:flex;gap:20px;justify-content:center;flex-wrap:wrap;flex:1;overflow-y:auto;align-content:flex-start;padding:8px 0;}
        .boutique-carte{width:190px;text-align:center;cursor:pointer;transition:transform 0.2s;border-radius:12px;padding:8px;border:2px solid transparent;}
        .boutique-carte:hover{transform:translateY(-6px);}
        .boutique-carte.selected{border-color:var(--gold);background:rgba(255,215,0,0.1);}
        .boutique-carte.bloquee{opacity:0.35;cursor:not-allowed;pointer-events:none;}
        .boutique-carte img{width:174px;height:244px;object-fit:cover;border-radius:8px;display:block;margin:0 auto;}
        .boutique-carte .cout{font-size:0.85em;font-weight:800;color:var(--gold);margin-top:8px;}
        .boutique-carte .nom{font-size:0.8em;color:rgba(255,255,255,0.8);margin-top:3px;font-weight:700;}
        .boutique-carte .types{font-size:0.72em;color:rgba(255,255,255,0.5);margin-top:2px;}
        .modal-actions{display:flex;gap:10px;justify-content:space-between;align-items:center;flex-wrap:wrap;margin-top:16px;}

        /* Modal zoom */
        .zoom-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:300;align-items:center;justify-content:center;}
        .zoom-bg.open{display:flex;}
        .zoom-inner{display:flex;flex-direction:column;align-items:center;gap:14px;}
        .zoom-inner img{max-width:380px;max-height:75vh;border-radius:12px;box-shadow:0 0 40px rgba(255,215,0,0.3);}
        .zoom-btns{display:flex;gap:12px;}

        /* Toast */
        .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:12px;font-weight:800;z-index:400;display:none;font-size:0.9em;}
    </style>
</head>
<body>

<div class="header">
    <div class="header-logo">⚔️ PKChess</div>
    <div class="header-code" id="header-code">----</div>
    <div class="header-status">
        <div class="dot" id="dot"></div>
        <span id="statut-txt">Connexion...</span>
    </div>
</div>

<div class="game-wrap">
    <div class="main-col">

        <div class="stats-bar">
            <div class="player-name" id="player-name">🎮 Dresseur</div>
            <div class="stat-pill hp">❤️ <span class="stat-val" id="mes-pv">100</span></div>
            <div class="pv-bar-bg"><div class="pv-bar" id="pv-bar" style="width:100%"></div></div>
            <div class="stat-pill gp">🪙 <span class="stat-val" id="mes-pieces">0</span></div>
            <div class="stat-pill lv">⭐ Niv.<span class="stat-val" id="mon-niveau">1</span></div>
            <div class="stat-pill xp">📊 <span class="stat-val" id="mon-exp">0</span> XP</div>
            <div style="font-size:0.82em;font-weight:800;color:rgba(255,255,255,0.5)">Tour <span id="tour-num">0</span></div>
        </div>

        <div class="plateau-wrap">
            <div class="rangee-label"><span class="dot-rouge"></span> Arène Offensive</div>
            <div class="rangee" id="rangee-off"></div>
            <div class="sep"></div>
            <div class="rangee-label"><span class="dot-bleu"></span> Arène Défensive</div>
            <div class="rangee" id="rangee-def"></div>
            <div class="sep"></div>
            <div class="rangee-label"><span class="dot-noir"></span> Boîte</div>
            <div class="rangee" id="rangee-boite"></div>
        </div>

        <div class="actions-bar">
            <button class="btn btn-green" id="btn-fin-tour" onclick="finTour()">✅ Fin de tour</button>
            <button class="btn btn-gold"  onclick="ouvrirBoutique()">🛒 Boutique</button>
            <button class="btn btn-blue"  onclick="acheterXp()">📈 XP (4🪙)</button>
        </div>

    </div>

    <div class="sidebar">
        <div class="panel">
            <div class="panel-title">✨ Synergies actives</div>
            <div class="syn-wrap" id="mes-synergies">
                <span style="color:rgba(255,255,255,0.3);font-size:0.8em;font-weight:700">Aucune synergie</span>
            </div>
        </div>
        <div class="panel">
            <div class="panel-title">👥 Autres dresseurs</div>
            <div id="adversaires-list"><div class="attente">En attente...</div></div>
        </div>
        <div class="panel" style="flex:1">
            <div class="panel-title">📋 Journal</div>
            <div class="log-list" id="log-list"></div>
        </div>
    </div>
</div>

<!-- Modal boutique -->
<div class="modal-bg" id="modal-boutique">
    <div class="modal">
        <div class="modal-header">
            <div class="modal-title">🛒 Boutique</div>
            <div class="modal-info" id="boutique-info">Chargement...</div>
        </div>
        <div class="boutique-cartes" id="boutique-cartes">
            <div class="attente">Chargement...</div>
        </div>
        <div class="modal-actions">
            <div style="display:flex;gap:10px;">
                <button class="btn btn-blue" onclick="roll()">🎲 Roll (2🪙)</button>
                <button class="btn btn-lock" id="btn-lock" onclick="toggleLock()">🔓 Garder</button>
            </div>
            <div style="display:flex;gap:10px;">
                <button class="btn btn-red"  onclick="fermerBoutique()">Passer</button>
                <button class="btn btn-gold" id="btn-capturer" onclick="capturerPokemon()" disabled>⚡ Capturer</button>
            </div>
        </div>
    </div>
</div>

<!-- Modal zoom -->
<div class="zoom-bg" id="zoom-bg" onclick="fermerZoom()">
    <div class="zoom-inner" onclick="event.stopPropagation()">
        <img id="zoom-img" src="" alt="">
        <div class="zoom-btns">
            <button class="btn btn-red"  id="btn-vendre" onclick="vendrePokemon()" style="display:none">💸 Vendre</button>
            <button class="btn btn-gray" onclick="fermerZoom()">✕ Fermer</button>
        </div>
    </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── Config ───────────────────────────────────────────────────────────────────
const CODE   = "{{ code }}";
const PSEUDO = new URLSearchParams(window.location.search).get('pseudo') || 'Dresseur';
const IMG    = "https://media.githubusercontent.com/media/Timberklinx/pkchess/master/pkchess-app/cartes/";

document.getElementById('header-code').textContent = CODE;
document.getElementById('player-name').textContent  = '🎮 ' + PSEUDO;

// ── État local ────────────────────────────────────────────────────────────────
let ws, etat;
let boutique_offre     = [];
let boutique_selection = null;
let boutique_locked    = false;
let zoom_pos = null, zoom_slot = null;
let drag_pos = null, drag_slot = null;

// ── WebSocket ─────────────────────────────────────────────────────────────────
function connecterWS() {
    var proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(proto + '://' + location.host + '/ws/' + CODE + '/' + PSEUDO);

    ws.onopen = function() {
        document.getElementById('dot').classList.add('on');
        document.getElementById('statut-txt').textContent = 'Connecté';
    };

    ws.onclose = function() {
        document.getElementById('dot').classList.remove('on');
        document.getElementById('statut-txt').textContent = 'Reconnexion...';
        setTimeout(connecterWS, 2000);
    };

    ws.onmessage = function(e) {
        var msg = JSON.parse(e.data);

        if (msg.etat) {
            etat = msg.etat;
            majInterface();
        }
        if (msg.msg) {
            var cls = (msg.type === 'fin_tour') ? 'gold' : '';
            addLog(msg.msg, cls);
        }
        if (msg.type === 'joueur_connecte' && msg.pseudo !== PSEUDO) {
            addLog(msg.pseudo + ' a rejoint', 'green');
        }
        if (msg.type === 'joueur_deconnecte') {
            addLog(msg.pseudo + ' déconnecté', 'red');
        }
        if (msg.type === 'erreur' && msg.pour === PSEUDO) {
            showToast(msg.msg, true);
        }
        if (msg.type === 'boutique_offre' && msg.pour === PSEUDO) {
            boutique_offre = msg.offre || [];
            afficherBoutique(msg.tour, msg.tour1_gratuit);
            if (msg.auto) {
                document.getElementById('modal-boutique').classList.add('open');
            }
        }
    };
}

// ── Interface principale ──────────────────────────────────────────────────────
function majInterface() {
    if (!etat || !etat.joueurs) return;
    var moi = etat.joueurs[PSEUDO];
    if (!moi) return;

    document.getElementById('mes-pv').textContent     = moi.pv;
    document.getElementById('mes-pieces').textContent = moi.pieces;
    document.getElementById('mon-niveau').textContent = moi.niveau;
    document.getElementById('mon-exp').textContent    = moi.exp || 0;
    document.getElementById('tour-num').textContent   = etat.tour || 0;
    document.getElementById('pv-bar').style.width     = Math.max(0, Math.min(100, moi.pv)) + '%';

    // Synergies
    var syns   = moi.synergies || {};
    var synEl  = document.getElementById('mes-synergies');
    var keys   = Object.keys(syns);
    if (keys.length === 0) {
        synEl.innerHTML = '<span style="color:rgba(255,255,255,0.3);font-size:0.8em;font-weight:700">Aucune synergie</span>';
    } else {
        var html = '';
        for (var i = 0; i < keys.length; i++) {
            var t = keys[i], n = syns[t];
            html += '<span class="syn-badge actif">' + t + ' ' + n + '</span>';
        }
        synEl.innerHTML = html;
    }

    // Adversaires
    var advEl = document.getElementById('adversaires-list');
    var advs  = [];
    for (var p in etat.joueurs) {
        if (p !== PSEUDO) advs.push([p, etat.joueurs[p]]);
    }
    if (advs.length === 0) {
        advEl.innerHTML = '<div class="attente">En attente...</div>';
    } else {
        var html = '';
        for (var i = 0; i < advs.length; i++) {
            var nom = advs[i][0], j = advs[i][1];
            html += '<div class="adversaire">'
                  + '<div class="adv-avatar">' + nom.substring(0,2).toUpperCase() + '</div>'
                  + '<div class="adv-info">'
                  + '<div class="adv-nom">' + nom + '</div>'
                  + '<div class="adv-stats"><span class="adv-hp">❤️' + j.pv + '</span>'
                  + '<span class="adv-gp">🪙' + j.pieces + '</span>'
                  + '<span class="adv-lv">⭐' + j.niveau + '</span></div>'
                  + '</div></div>';
        }
        advEl.innerHTML = html;
    }

    renderPlateau();
}

// ── Plateau ───────────────────────────────────────────────────────────────────
function getPoke(pos, slot) {
    if (!etat || !etat.joueurs || !etat.joueurs[PSEUDO]) return null;
    var pokemons = etat.joueurs[PSEUDO].pokemon || [];
    for (var i = 0; i < pokemons.length; i++) {
        if (pokemons[i].position === pos && pokemons[i].slot === slot) return pokemons[i];
    }
    return null;
}

function renderPlateau() {
    var niveau = etat && etat.joueurs && etat.joueurs[PSEUDO] ? etat.joueurs[PSEUDO].niveau : 1;
    var dispo  = niveau >= 5 ? 5 : 3;
    renderRangee('rangee-off',   'off',  dispo, 'offensive');
    renderRangee('rangee-def',   'def',  dispo, 'defensive');
    renderRangee('rangee-boite', 'banc', 5,     'boite');
}

function renderRangee(containerId, pos, dispo, cssClass) {
    var container = document.getElementById(containerId);
    container.innerHTML = '';
    for (var i = 0; i < 5; i++) {
        var niveau_j = etat && etat.joueurs && etat.joueurs[PSEUDO] ? etat.joueurs[PSEUDO].niveau : 1;
        // Cases 0 et 4 (extrêmes) bloquées avant niveau 5, cases 1-2-3 toujours accessibles
        var bloquee = pos !== 'banc' && (i === 0 || i === 4) && niveau_j < 5;
        // Compter les pokemon déjà sur le terrain (off + def)
        var nbTerrain = 0;
        if (etat && etat.joueurs && etat.joueurs[PSEUDO]) {
            var poks = etat.joueurs[PSEUDO].pokemon || [];
            for (var k = 0; k < poks.length; k++) {
                if (poks[k].position === 'off' || poks[k].position === 'def') nbTerrain++;
            }
        }
        // Terrain plein si nb pokemon sur terrain >= niveau dresseur
        var terrainPlein = !getPoke(pos, i) && pos !== 'banc' && !bloquee && nbTerrain >= niveau_j;
        var offDevant = pos === 'def' && !bloquee && !getPoke('off', i);
        var poke      = getPoke(pos, i);

        var el = document.createElement('div');
        el.className    = 'case ' + cssClass;
        el.dataset.pos  = pos;
        el.dataset.slot = i;

        if (bloquee || offDevant) {
            el.classList.add('bloquee');
            el.innerHTML = '<span class="lock-icon">🔒</span>';
        } else if (poke) {
            el.classList.add('occupee');
            var id4 = String(poke.id).padStart(4, '0');
            el.innerHTML = '<img src="' + IMG + id4 + '.png" alt="' + poke.nom
                + '" onclick="ouvrirZoom(\'' + IMG + id4 + '.png\',\'' + pos + '\',' + i + ')">'
                + '<div class="poke-nom">' + poke.nom + '</div>';
            el.draggable = true;
            (function(p, s) {
                el.addEventListener('dragstart', function(e) {
                    drag_pos  = p;
                    drag_slot = s;
                    e.dataTransfer.effectAllowed = 'move';
                    el.style.opacity = '0.4';
                });
                el.addEventListener('dragend', function() {
                    el.style.opacity = '1';
                });
            })(pos, i);
        } else {
            if (terrainPlein && pos !== 'banc') {
                el.classList.add('bloquee');
                el.innerHTML = '<span class="lock-icon">🚫</span>';
            } else {
                el.innerHTML = '<span class="plus">+</span>';
            }
        }

        // Drop
        el.addEventListener('dragover', function(e) {
            e.preventDefault();
            this.classList.add('droppable');
        });
        el.addEventListener('dragleave', function() {
            this.classList.remove('droppable');
        });
        el.addEventListener('drop', function(e) {
            e.preventDefault();
            this.classList.remove('droppable');
            var toPos  = this.dataset.pos;
            var toSlot = parseInt(this.dataset.slot);
            if (drag_pos !== null && !this.classList.contains('bloquee')) {
                if (drag_pos !== toPos || drag_slot !== toSlot) {
                    deplacerPokemon(drag_pos, drag_slot, toPos, toSlot);
                }
            }
            drag_pos = drag_slot = null;
        });

        container.appendChild(el);
    }
}

// ── Boutique ──────────────────────────────────────────────────────────────────
function ouvrirBoutique() {
    boutique_selection = null;
    document.getElementById('btn-capturer').disabled = true;
    document.getElementById('btn-capturer').textContent = '⚡ Capturer';
    document.getElementById('modal-boutique').classList.add('open');
    if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({type: 'demander_boutique'}));
    }
}

function fermerBoutique() {
    document.getElementById('modal-boutique').classList.remove('open');
    boutique_selection = null;
}

function afficherBoutique(tour, tour1_gratuit) {
    var container = document.getElementById('boutique-cartes');
    var moi       = etat && etat.joueurs ? etat.joueurs[PSEUDO] : null;
    var pieces    = moi ? moi.pieces : 0;
    var t         = (tour !== undefined) ? tour : (etat ? etat.tour : 0);
    var t_actuel  = etat ? etat.tour : 0;
    var gratuit   = (t_actuel === 0) && tour1_gratuit && !(moi && moi.a_achete_tour1);

    document.getElementById('boutique-info').textContent = gratuit
        ? '🎁 Capture un Pokémon gratuitement !'
        : '🪙 ' + pieces + ' pièces disponibles';

    if (!boutique_offre || boutique_offre.length === 0) {
        container.innerHTML = '<div class="attente">Aucune offre disponible</div>';
        return;
    }

    var html = '';
    for (var i = 0; i < boutique_offre.length; i++) {
        var poke  = boutique_offre[i];
        var id4   = String(poke.id).padStart(4, '0');
        var cout  = poke.niveau;
        var peux  = gratuit || pieces >= cout;
        var types = Array.isArray(poke.types) ? poke.types.join(', ') : (poke.types || '');
        var coutTxt = gratuit ? '🎁 Gratuit' : (cout + ' 🪙');

        html += '<div class="boutique-carte' + (peux ? '' : ' bloquee') + '" '
              + (peux ? 'onclick="selectionnerPoke(' + i + ')"' : '') + '>'
              + '<img src="' + IMG + id4 + '.png" alt="' + poke.nom
              + '" ondblclick="event.stopPropagation();ouvrirZoom(\'' + IMG + id4 + '.png\',null,null)">'
              + '<div class="cout">' + coutTxt + '</div>'
              + '<div class="nom">' + poke.nom + '</div>'
              + '<div class="types">' + types + '</div>'
              + '</div>';
    }
    container.innerHTML = html;
}

function selectionnerPoke(idx) {
    boutique_selection = idx;
    var cartes = document.querySelectorAll('.boutique-carte');
    for (var i = 0; i < cartes.length; i++) {
        cartes[i].classList.toggle('selected', i === idx);
    }
    var btnC = document.getElementById('btn-capturer');
    btnC.disabled = false;
    var moi    = etat && etat.joueurs ? etat.joueurs[PSEUDO] : null;
    var t      = etat ? etat.tour : 0;
    var gratuit = (t === 0) && !(moi && moi.a_achete_tour1);
    btnC.textContent = gratuit ? '🎁 Capturer gratuitement' : '⚡ Capturer';
}

function capturerPokemon() {
    if (boutique_selection === null) return;
    var poke    = boutique_offre[boutique_selection];
    var moi     = etat && etat.joueurs ? etat.joueurs[PSEUDO] : null;
    var t       = etat ? etat.tour : 0;
    var gratuit = (t === 0) && !(moi && moi.a_achete_tour1);
    var cout    = gratuit ? 0 : poke.niveau;
    if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({type: 'capturer_pokemon', pokemon_id: poke.id, cout: cout}));
    }
    fermerBoutique();
}

function roll() {
    if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({type: 'roll'}));
    }
}

function toggleLock() {
    boutique_locked = !boutique_locked;
    var btn = document.getElementById('btn-lock');
    if (boutique_locked) {
        btn.textContent = '🔒 Gardée';
        btn.classList.add('locked');
        showToast('Boutique verrouillée pour le prochain tour', false);
    } else {
        btn.textContent = '🔓 Garder';
        btn.classList.remove('locked');
    }
    if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({type: 'lock_boutique', locked: boutique_locked}));
    }
}

// ── Zoom / Vente ──────────────────────────────────────────────────────────────
function ouvrirZoom(src, pos, slot) {
    document.getElementById('zoom-img').src = src;
    document.getElementById('zoom-bg').classList.add('open');
    zoom_pos  = pos;
    zoom_slot = slot;
    var btnV = document.getElementById('btn-vendre');
    if (pos !== null && slot !== null) {
        var poke = getPoke(pos, slot);
        var prix = poke ? poke.niveau : 0;
        btnV.style.display  = 'inline-block';
        btnV.textContent    = '💸 Vendre (' + prix + ' 🪙)';
    } else {
        btnV.style.display = 'none';
    }
}

function fermerZoom() {
    document.getElementById('zoom-bg').classList.remove('open');
    zoom_pos = zoom_slot = null;
}

function vendrePokemon() {
    if (zoom_pos === null || zoom_slot === null) return;
    if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({type: 'vendre_pokemon', position: zoom_pos, slot: zoom_slot}));
    }
    fermerZoom();
}

// ── Actions plateau ───────────────────────────────────────────────────────────
function deplacerPokemon(fp, fs, tp, ts) {
    if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({type: 'deplacer_pokemon', from_pos: fp, from_slot: fs, to_pos: tp, to_slot: ts}));
    }
}

function finTour() {
    if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({type: 'fin_tour', boutique_locked: boutique_locked}));
    }
    // Reset lock visuellement après fin de tour
    boutique_locked = false;
    var btn = document.getElementById('btn-lock');
    if (btn) { btn.textContent = '🔓 Garder'; btn.classList.remove('locked'); }
}

function acheterXp() {
    if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({type: 'acheter_xp'}));
    }
}

// ── Log & Toast ───────────────────────────────────────────────────────────────
function addLog(msg, cls) {
    var list = document.getElementById('log-list');
    var item = document.createElement('div');
    item.className = 'log-item' + (cls ? ' ' + cls : '');
    var h = new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
    item.innerHTML = '<span class="log-time">' + h + '</span><span>' + msg + '</span>';
    list.insertBefore(item, list.firstChild);
    while (list.children.length > 60) list.removeChild(list.lastChild);
}

function showToast(msg, erreur) {
    var el = document.getElementById('toast');
    el.textContent   = msg;
    el.style.background = erreur ? '#E63946' : '#52B788';
    el.style.color      = 'white';
    el.style.display    = 'block';
    setTimeout(function() { el.style.display = 'none'; }, 3000);
}

// ── Init ──────────────────────────────────────────────────────────────────────
connecterWS();
renderPlateau(); // Afficher les cases vides même avant connexion
</script>
